<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="Snake game">
        <header class="hud">
          <div>
            <p class="label">Score</p>
            <p id="score" class="value">0</p>
          </div>
          <div>
            <p class="label">Status</p>
            <p id="status" class="value">Ready</p>
          </div>
        </header>

        <div class="board-wrap">
          <canvas
            id="board"
            width="420"
            height="420"
            aria-label="Snake board"
          ></canvas>
        </div>

        <div class="actions">
          <button id="restart-button" type="button">Restart</button>
          <button id="pause-button" type="button">Pause</button>
        </div>

        <div class="controls-panel">
          <p class="help">
            Arrow keys or WASD to move. Space or P to pause. Enter or R to restart after game over.
          </p>
          <div class="touch-controls" aria-label="Touch controls">
            <button type="button" data-direction="up">Up</button>
            <div class="touch-row">
              <button type="button" data-direction="left">Left</button>
              <button type="button" data-direction="down">Down</button>
              <button type="button" data-direction="right">Right</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/snakeApp.js"></script>
  </body>
</html>
